<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Introuvable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:var(--dark)}
    .err-wrap{text-align:center;max-width:560px}
    .err-num{font-family:var(--font-display);font-size:clamp(6rem,20vw,10rem);color:var(--primary);line-height:1;opacity:.15;position:relative;display:inline-block}
    .err-num::after{content:'404';position:absolute;inset:0;color:var(--white);opacity:1;font-size:inherit}
    .err-icon{font-size:5rem;margin-bottom:1rem;animation:bounce 2s infinite}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
    .err-title{font-family:var(--font-display);font-size:2.5rem;color:var(--white);margin-bottom:.8rem}
    .err-desc{color:var(--gray);font-size:1rem;line-height:1.7;margin-bottom:2rem}
    .err-links{display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap}
    .search-suggest{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);padding:1.2rem;margin-bottom:2rem;text-align:left}
    .suggest-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gray);margin-bottom:.8rem}
    .suggest-link{display:flex;align-items:center;gap:.6rem;padding:.5rem .7rem;border-radius:var(--radius);transition:var(--transition);color:var(--light);font-size:.88rem}
    .suggest-link:hover{background:rgba(255,255,255,.05);color:var(--primary)}
    .suggest-link i{color:var(--primary);width:16px}
  </style>
</head>
<body>
<div class="err-wrap">
  <div class="err-icon">🏃</div>
  <div class="err-title">Page <span style="color:var(--primary)">Introuvable</span></div>
  <p class="err-desc">Cette page s'est peut-être échappée du terrain ! La ressource demandée n'existe pas ou a été déplacée.</p>

  <div class="search-suggest">
    <div class="suggest-title">Peut-être cherchiez-vous ?</div>
    <a href="blog.html" class="suggest-link"><i class="fas fa-home"></i> Page d'accueil</a>
    <a href="activites.html" class="suggest-link"><i class="fas fa-running"></i> Nos activités sportives</a>
    <a href="espace-membre.html" class="suggest-link"><i class="fas fa-user"></i> Mon espace membre</a>
    <a href="contact.html" class="suggest-link"><i class="fas fa-envelope"></i> Nous contacter</a>
    <a href="auth/login.html" class="suggest-link"><i class="fas fa-sign-in-alt"></i> Se connecter</a>
  </div>

  <div class="err-links">
    <a href="blog.html" class="btn btn-primary"><i class="fas fa-home"></i> Retour à l'accueil</a>
    <button onclick="history.back()" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Page précédente</button>
  </div>

  <p style="color:rgba(255,255,255,.2);font-size:.75rem;margin-top:2rem">Code erreur 404 · Association Sportive Club</p>
</div>
<script src="../assets/js/app.js"></script>
</body>
</html>
